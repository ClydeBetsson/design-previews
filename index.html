<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: #FAFAFC;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
    }

    .wrap {
      width: min(calc(100vw - 48px), 1440px);
      margin: 0 auto;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .frame-area {
      position: relative;
      width: 100%;
      height: auto;
      max-height: 868px;
      aspect-ratio: 1440 / 868;
      background: rgba(2, 6, 23, 0.45);
      overflow: hidden;
    }

    iframe {
      width: 1440px;
      height: 868px;
      border: 0;
      display: block;
      transform-origin: top left;
    }

    @media (max-width: 768px) {
      body { padding: 14px; }
      .wrap {
        width: 100%;
      }
    }

    @media (max-width: 932px) and (orientation: landscape) {
      body {
        padding: 10px;
      }

      .wrap {
        width: auto;
      }
    }

  </style>
</head>
<body>
  <main class="wrap">
    <section class="frame-area">
      <iframe
        id="portfolio-prototype"
        src="https://embed.figma.com/proto/T9J3WfJAqlPMpMrOGsp4nH/Portfolios?node-id=521-4921&scaling=scale-down-width&starting-point-node-id=521%3A4921&page-id=370%3A105&embed-host=share&hide-ui=1"
        allowfullscreen>
      </iframe>
    </section>
  </main>
  <script>
    const PORTFOLIO_CONFIG = {
      prototypeUrl: 'https://embed.figma.com/proto/T9J3WfJAqlPMpMrOGsp4nH/Portfolios?node-id=521-4921&scaling=scale-down-width&starting-point-node-id=521%3A4921&page-id=370%3A105&embed-host=share&hide-ui=1'
    };

    const MOBILE_WIDTH_BREAKPOINT = 768;
    const LANDSCAPE_BREAKPOINT = 932;
    const PROTOTYPE_WIDTH = 1440;
    const PROTOTYPE_HEIGHT = 868;

    function applyPortfolioContent() {
      const prototype = document.querySelector('#portfolio-prototype');

      if (prototype) {
        prototype.src = PORTFOLIO_CONFIG.prototypeUrl;
      }
    }

    function updateResponsiveFrame() {
      const wrap = document.querySelector('.wrap');
      const frameArea = document.querySelector('.frame-area');
      const prototype = document.querySelector('#portfolio-prototype');

      if (!wrap || !frameArea || !prototype) {
        return;
      }

      wrap.style.width = '';

      const isPortraitMobile = window.innerWidth <= MOBILE_WIDTH_BREAKPOINT && window.matchMedia('(orientation: portrait)').matches;
      const horizontalPadding = isPortraitMobile ? 28 : 48;
      const verticalPadding = isPortraitMobile ? 28 : 48;
      const availableWidth = Math.max(window.innerWidth - horizontalPadding, 280);
      const availableHeight = Math.max(window.innerHeight - verticalPadding - 2, 180);
      const widthFromHeight = (availableHeight * PROTOTYPE_WIDTH) / PROTOTYPE_HEIGHT;
      const fitWidth = Math.min(availableWidth, widthFromHeight, PROTOTYPE_WIDTH);
      const scale = fitWidth / PROTOTYPE_WIDTH;

      wrap.style.width = `${Math.max(280, fitWidth)}px`;
      frameArea.style.height = `${Math.max(180, PROTOTYPE_HEIGHT * scale)}px`;
      prototype.style.transform = `scale(${scale})`;
    }

    window.addEventListener('load', () => {
      applyPortfolioContent();
      updateResponsiveFrame();
    });
    window.addEventListener('resize', updateResponsiveFrame);
    window.addEventListener('orientationchange', updateResponsiveFrame);
  </script>
</body>
</html>
