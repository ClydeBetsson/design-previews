<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma Prototype Preview</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #1d4ed8 0%, transparent 40%),
        radial-gradient(circle at 80% 0%, #0ea5e9 0%, transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 24px;
      display: grid;
      place-items: center;
    }

    .wrap {
      width: min(1200px, 100%);
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      color: #052e16;
      background: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .frame-area {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: rgba(2, 6, 23, 0.45);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .footer {
      padding: 12px 18px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      body { padding: 14px; }
      .frame-area { aspect-ratio: 9 / 16; }
      .footer { font-size: 12px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1 class="title">Product Prototype Demo</h1>
      <span class="badge">Live Figma Embed</span>
    </header>

    <section class="frame-area">
      <iframe
        src="PASTE_YOUR_FIGMA_EMBED_URL_HERE"
        allowfullscreen>
      </iframe>
    </section>

    <footer class="footer">
      Tip: Keep your Figma file share setting on "Anyone with the link can view."
    </footer>
  </main>
</body>
</html>
