<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: #FAFAFC;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
    }

    .wrap {
      width: min(calc(100vw - 48px), 1440px);
      margin: 0 auto;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 500;
      letter-spacing: 0.2px;
      color: #03045E;
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      color: #052e16;
      background: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .frame-area {
      width: 100%;
      height: auto;
      max-height: 868px;
      aspect-ratio: 1440 / 868;
      background: rgba(2, 6, 23, 0.45);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .footer {
      padding: 12px 18px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      body { padding: 14px; }
      .topbar {
        justify-content: center;
        text-align: center;
      }
      .wrap {
        width: 100%;
      }
      .footer { font-size: 12px; }
    }

    @media (max-width: 932px) and (orientation: landscape) {
      body {
        padding: 10px;
      }

      .topbar {
        padding: 10px 14px;
      }

      .wrap {
        width: auto;
      }
    }

  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1 class="title">My Portfolio</h1>
    </header>

    <section class="frame-area">
      <iframe
        src="https://embed.figma.com/proto/T9J3WfJAqlPMpMrOGsp4nH/Portfolios?node-id=521-4921&scaling=min-zoom&content-scaling=fixed&starting-point-node-id=521%3A4921&page-id=370%3A105&embed-host=share&hide-ui=1"
        allowfullscreen>
      </iframe>
    </section>


  </main>
  <script>
    const MOBILE_WIDTH_BREAKPOINT = 768;
    const LANDSCAPE_BREAKPOINT = 932;
    const PROTOTYPE_WIDTH = 1440;
    const PROTOTYPE_HEIGHT = 868;

    function updateResponsiveFrame() {
      const wrap = document.querySelector('.wrap');
      const topbar = document.querySelector('.topbar');

      if (!wrap || !topbar) {
        return;
      }

      wrap.style.width = '';

      const isPortraitMobile = window.innerWidth <= MOBILE_WIDTH_BREAKPOINT && window.matchMedia('(orientation: portrait)').matches;
      const isLandscapeMobile = window.innerWidth <= LANDSCAPE_BREAKPOINT && window.matchMedia('(orientation: landscape)').matches;

      if (isPortraitMobile) {
        wrap.style.width = '100%';
        return;
      }

      if (isLandscapeMobile) {
        const horizontalPadding = 20;
        const verticalPadding = 20;
        const availableWidth = window.innerWidth - horizontalPadding;
        const availableHeight = window.innerHeight - topbar.offsetHeight - verticalPadding - 2;
        const widthFromHeight = (availableHeight * PROTOTYPE_WIDTH) / PROTOTYPE_HEIGHT;

        wrap.style.width = `${Math.min(availableWidth, widthFromHeight)}px`;
      }
    }

    window.addEventListener('load', updateResponsiveFrame);
    window.addEventListener('resize', updateResponsiveFrame);
    window.addEventListener('orientationchange', updateResponsiveFrame);
  </script>
</body>
</html>
