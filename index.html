<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: #FAFAFC;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
    }

    .wrap {
      width: min(1440px, 100%);
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 500;
      letter-spacing: 0.2px;
      color: #03045E;
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      color: #052e16;
      background: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .frame-area {
      width: 100%;
      height: auto;
      aspect-ratio: 1440 / 868;
      background: rgba(2, 6, 23, 0.45);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .footer {
      padding: 12px 18px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      body { padding: 14px; }
      .footer { font-size: 12px; }
    }

  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1 class="title">My Portfolio</h1>
    </header>

    <section class="frame-area">
      <iframe
        src="https://embed.figma.com/proto/T9J3WfJAqlPMpMrOGsp4nH/Portfolios?node-id=521-4921&scaling=min-zoom&content-scaling=fixed&starting-point-node-id=521%3A4921&page-id=370%3A105&embed-host=share&hide-ui=1"
        allowfullscreen>
      </iframe>
    </section>


  </main>
</body>
</html>
