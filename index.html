<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      background: #FAFAFC;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
    }

    .wrap {
      width: min(calc(100vw - 48px), 1440px);
      margin: 0 auto;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 500;
      letter-spacing: 0.2px;
      color: #03045E;
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      color: #052e16;
      background: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .frame-area {
      width: 100%;
      height: 0;
      background: rgba(2, 6, 23, 0.45);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    @media (max-width: 768px) {
      body { padding: 14px; }
      .topbar {
        align-items: center;
        text-align: center;
      }
      .wrap {
        width: 100%;
      }
    }

    @media (max-width: 932px) and (orientation: landscape) {
      body {
        padding: 10px;
      }

      .topbar {
        padding: 10px 14px;
      }

      .wrap {
        width: auto;
      }
    }

  </style>
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1 class="title">My Portfolio</h1>
    </header>

    <section class="frame-area">
      <iframe
        id="portfolio-prototype"
        src="https://embed.figma.com/proto/T9J3WfJAqlPMpMrOGsp4nH/Portfolios?node-id=521-4921&scaling=contain&content-scaling=responsive&starting-point-node-id=521%3A4921&page-id=370%3A105&embed-host=share&hide-ui=1"
        allowfullscreen>
      </iframe>
    </section>

  </main>
  <script>
    const PROTOTYPE_WIDTH = 1440;
    const PROTOTYPE_HEIGHT = 868;

    function updateResponsiveFrame() {
      const wrap = document.querySelector('.wrap');
      const topbar = document.querySelector('.topbar');
      const frameArea = document.querySelector('.frame-area');

      if (!wrap || !topbar || !frameArea) {
        return;
      }

      const bodyStyle = window.getComputedStyle(document.body);
      const bodyHorizontalPadding = parseFloat(bodyStyle.paddingLeft) + parseFloat(bodyStyle.paddingRight);
      const aspectRatio = PROTOTYPE_WIDTH / PROTOTYPE_HEIGHT;

      const availableWidth = Math.max(320, window.innerWidth - bodyHorizontalPadding - 2);
      const frameWidth = availableWidth;
      const frameHeight = frameWidth / aspectRatio;

      wrap.style.width = `${frameWidth}px`;
      frameArea.style.width = `${frameWidth}px`;
      frameArea.style.height = `${frameHeight}px`;
    }

    window.addEventListener('load', updateResponsiveFrame);
    window.addEventListener('resize', updateResponsiveFrame);
    window.addEventListener('orientationchange', updateResponsiveFrame);
  </script>
</body>
</html>
